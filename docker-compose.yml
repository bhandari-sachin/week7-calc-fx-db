version: '3.8'

services:
  db:
    image: mariadb:11
    container_name: calculator-db
    restart: always
    environment:
      # Change MYSQL_ROOT_PASSWORD to your own password
      MYSQL_ROOT_PASSWORD: Test12
      MYSQL_DATABASE: calc_data
    # Change 3307 if that port is already in use on your machine
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  app:
    # Change this to your own Docker Hub image:
    #   docker build -t yourusername/calculator-fx-db .
    #   docker push yourusername/calculator-fx-db:latest
    #   then update the line below
    image: sachinbhandari/calculator-fx-db:latest
    container_name: calculator-app
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 3306
      # Change DB_USER and DB_PASSWORD to match MYSQL_ROOT_PASSWORD above
      DB_USER: root
      DB_PASSWORD: Test12
      DISPLAY: host.docker.internal:0
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix

volumes:
  db_data:

# To start: docker compose up -d